<!doctype html>
<html lang="en">
	<head>
		<script
			type="module"
			src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@latest/dist/turbo.es2017-esm.min.js"
		></script>
		<meta name="turbo-refresh-method" content="morph" />
		<meta name="turbo-refresh-scroll" content="preserve" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Collection Manager</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<main class="layout">
			<section class="panel left">
				<h1>Collection Manager</h1>
				<div class="controls">
					<label for="rootSelect">Category</label>
					<select id="rootSelect"></select>
				</div>

				<div class="controls create-row">
					<input
						id="newCollectionName"
						type="text"
						placeholder="New collection name"
					/>
					<button id="createCollectionButton" type="button">Create</button>
				</div>

				<ul id="collectionList" class="collection-list"></ul>

				<div class="sidebar-footer">
					<button id="syncButton" type="button" class="sync-button">
						Sync to Online
					</button>
					<p id="syncStatus" class="sync-status">
						Ready to sync to CDN manifest.
					</p>
				</div>
			</section>

			<section class="panel right">
				<header class="collection-header">
					<h2 id="collectionTitle">Select a collection</h2>
					<div id="collectionActions" class="collection-actions">
						<button id="addMediaButton" type="button" disabled>
							Add Media
						</button>
						<button id="saveSyncButton" type="button" disabled>
							Save &amp; Sync to Online
						</button>
						<button id="saveButton" type="button" disabled>Save</button>
					</div>
				</header>

				<div
					class="upload-controls"
					style="
						margin-bottom: 1rem;
						display: flex;
						align-items: center;
						gap: 0.75rem;
					"
				>
					<input id="mediaInput" type="file" multiple disabled />
					<select
						id="uploadSortDirection"
						disabled
						style="padding: 0.5rem; font-size: 0.9rem"
					>
						<option value="oldest">Oldest First</option>
						<option value="newest">Newest First</option>
					</select>
					<button
						id="uploadSortButton"
						type="button"
						disabled
						style="padding: 0.5rem 1rem; white-space: nowrap"
					>
						Sort
					</button>
				</div>
				<p id="uploadStatus" class="upload-status" hidden></p>

				<p class="help-text">
					Arrange with up/down. Rename titles and save to rewrite files as
					<strong>1 - Name.ext</strong>.
				</p>
				<ul id="itemList" class="item-list"></ul>
			</section>
		</main>

		<script type="module" src="/app.js"></script>
	</body>
</html>
