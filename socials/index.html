<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@latest/dist/turbo.es2017-esm.min.js"></script>
    <meta name="turbo-refresh-method" content="morph">
    <meta name="turbo-refresh-scroll" content="preserve">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Somebud's socials">
    <meta http-equiv="Cache-Control" content="max-age=31536000, must-revalidate">
    <title>SomeProot</title>
    <link rel="stylesheet" href="/SomeProot/Assets/CSS/main_styles.css">
    <link rel="stylesheet" href="/SomeProot/Assets/CSS/socials_styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Silkscreen:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body data-page="Socials">
    <header id="header" data-turbo-permanent>
        <nav>
            <h1>SomeProot</h1>
            <ul>
                <li><a href="/SomeProot/">Home</a></li>
                <li><a href="/SomeProot/projects/">Projects</a></li>
                <li><a href="/SomeProot/journal/">Journal</a></li>
                <li><a href="/SomeProot/gallery/">Gallery</a></li>
                <li><a href="/SomeProot/socials/">Socials</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page">
            <form class="picker" action="">
                <select name="social-media" class="custom-selector"
                    data-icon-base-path="/SomeProot/Assets/Images/Socials" data-details-selector=".card__details"
                    multiple>
                    <option value="slack">Slack</option>
                    <option value="github">GitHub</option>
                    <option value="instagram">Instagram</option>
                    <option value="twitter">Twitter</option>
                </select>
            </form>

            <div class="card" id="contentCard">
                <div class="card__details" section="None"></div>
                <div class="card__ghost" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <footer>
        <a href="https://hackclub.com/">
            <img src="/SomeProot/Assets/Images/Misc/Footer.png" alt="Signature. Love, Hack Club" height="32">
        </a>
        <p>&copy; 2026 Somebud. <a href="https://github.com/Somebud/SomeProot">Source on GitHub</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/SomeProot/Assets/JS/script.js"></script>
    <script src="https://somebud0180.github.io/slink/script.js"></script>
</body>
