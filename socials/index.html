<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Somebud's socials">
    <title>SomeProot</title>
    <link rel="stylesheet" href="/SomeProot/Assets/CSS/main_styles.css">
    <link rel="stylesheet" href="/SomeProot/Assets/CSS/socials_styles.css">
</head>
<body data-page="Socials">
    <header>
        <nav>
            <h1>SomeProot</h1>
            <ul>
                <li><a href="/SomeProot/">Home</a></li>
                <li><a href="/SomeProot/projects/">Projects</a></li>
                <li><a href="/SomeProot/journal/">Journal</a></li>
                <li><a href="/SomeProot/gallery/">Gallery</a></li>
                <li><a href="/SomeProot/socials/">Socials</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page">
            <div section="Social" class="picker">
                <form action="">
                    <select name="social-media" class="custom-selector" data-icon-base-path="/SomeProot/Assets/Images/Socials" data-details-selector=".card__details" multiple>
                        <option value="slack">Slack</option>
                        <option value="github">GitHub</option>
                        <option value="instagram">Instagram</option>
                        <option value="twitter">Twitter</option>
                    </select>
                </form>
            </div>

            <div class="card" id="contentCard">
                <div class="card__details" section="None"></div>
                <div class="card__ghost" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <footer>
        <a  href="https://hackclub.com/">
            <img src="/SomeProot/Assets/Images/Misc/Footer.png" alt="Signature. Love, Hack Club" height="32">
        </a>
        <p>&copy; 2026 Somebud. <a href="https://github.com/Somebud/SomeProot">Source on GitHub</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/SomeProot/Assets/JS/script.js"></script>
</body>
